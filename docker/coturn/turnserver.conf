# turnserver.conf — coturn configuration for ImmersiveRT
#
# IMPORTANT: static-auth-secret is NOT set in this file and is not passed
# as a CLI argument. It is injected at container startup by
# docker/coturn/docker-entrypoint.sh, which reads the TURN_SHARED_SECRET
# environment variable and appends the directive to a writable copy of this
# config. This keeps the secret out of `ps aux`, `docker inspect`, and
# /proc/<pid>/cmdline.

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
# relay-ip is left empty — coturn auto-detects from --external-ip command arg

# Realm
realm=immersivert.local

# Authentication — coturn REST API / shared secret mechanism (HMAC-SHA1 ephemeral credentials)
# use-auth-secret enables the shared secret mechanism. Do NOT also set lt-cred-mech —
# that is for username/password auth and conflicts with use-auth-secret.
use-auth-secret
# static-auth-secret is written at startup by docker-entrypoint.sh (see comment above)

# Security
fingerprint
no-multicast-peers
# Deny relay to loopback, link-local, private, and cloud-metadata ranges (SSRF mitigations).
# Any client with valid TURN credentials cannot probe internal services via relay.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Relay port range (UDP — all WebRTC data channel relay traffic)
min-port=49152
max-port=65535

# Resource quotas — prevent a single client from monopolizing relay bandwidth/slots.
# total-quota: max simultaneous relay sessions across all users.
# user-quota: max simultaneous relay sessions per credential username.
# max-bps: per-session bandwidth cap in bits/sec (~500 Kbps covers IMU data easily).
total-quota=100
user-quota=10
max-bps=500000

# Logging
log-file=stdout
