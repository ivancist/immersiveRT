# turnserver.conf — coturn configuration for ImmersiveRT
#
# IMPORTANT: static-auth-secret is NOT set in this file.
# It is injected via the --static-auth-secret command-line argument in
# docker-compose.yml (coturn service "command:" array) using the value from
# the .env file via ${TURN_SHARED_SECRET} substitution. This avoids ever
# committing a secret value to git.
#
# docker-compose.yml coturn command:
#   command: ["-c", "/etc/coturn/turnserver.conf",
#             "--external-ip=${COTURN_EXTERNAL_IP}",
#             "--static-auth-secret=${TURN_SHARED_SECRET}"]

# Network
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
# relay-ip is left empty — coturn auto-detects from --external-ip command arg

# Realm
realm=immersivert.local

# Authentication — coturn REST API / shared secret mechanism (HMAC-SHA1 ephemeral credentials)
# use-auth-secret enables the shared secret mechanism. Do NOT also set lt-cred-mech —
# that is for username/password auth and conflicts with use-auth-secret.
use-auth-secret
# static-auth-secret is passed via --static-auth-secret CLI arg (see comment above)

# Security
fingerprint
no-multicast-peers
no-loopback-peers
# Deny relay to loopback, link-local, private, and cloud-metadata ranges (SSRF mitigations).
# Any client with valid TURN credentials cannot probe internal services via relay.
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# Relay port range (UDP — all WebRTC data channel relay traffic)
min-port=49152
max-port=65535

# Logging
log-file=stdout
