# ImmersiveRT — nginx static file server
#
# Serves the desktop game client (client/dist) with:
#   - HTTP on port 80  (non-phone local testing)
#   - HTTPS on port 443 (required for camera-app QR auto-open — D-13, RESEARCH.md Pitfall 5)
#   - SPA fallback so /room/ABCD, /phone, etc. all serve index.html (D-06)
#
# Cert paths match the volume mount in docker-compose.yml (./certs:/certs:ro).
# Certs are generated by `make dev-certs` using mkcert — same files used by the Rust server.
#
# Do NOT add /api proxy or upstream blocks — the Rust server owns all WS/WT traffic on
# ports 9090 and 4433. This nginx instance is static-only.

server {
    listen 80;
    listen 443 ssl;

    ssl_certificate     /certs/localhost+2.pem;
    ssl_certificate_key /certs/localhost+2-key.pem;

    # WR-09: Restrict to TLS 1.2+ and modern AEAD ciphers; disable TLS 1.0/1.1
    # which are deprecated (RFC 8996) and vulnerable to known downgrade attacks.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;

    root  /usr/share/nginx/html;
    index index.html;

    location / {
        # SPA routing (D-06, D-13): static assets are served directly; known HTML
        # pages like phone.html are served via $uri.html (so /phone → phone.html);
        # all other unknown paths fall back to index.html for client-side routing.
        # The $uri.html fallback is required for /phone to resolve to phone.html
        # without a redirect — omitting it makes /phone serve index.html (RESEARCH Pitfall 6).
        try_files $uri $uri.html /index.html;
    }
}
